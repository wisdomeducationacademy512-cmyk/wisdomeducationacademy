<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parent Dashboard - School Management System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-3xl mx-auto p-6">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">👨‍👩‍👦 Parent Dashboard</h1>
        <p class="text-gray-500 text-sm">School Management System</p>
      </div>
      <button onclick="logout()" class="bg-red-100 hover:bg-red-200 text-red-700 px-4 py-2 rounded-lg font-medium transition">Logout</button>
    </div>

    <div id="loadingBox" class="text-center text-gray-400 py-12">Loading...</div>

    <!-- Student Info Card -->
    <div id="studentCard" class="hidden bg-white rounded-xl shadow p-6 mb-6">
      <h2 class="text-lg font-bold text-gray-800 mb-4">Student Information</h2>
      <div class="grid grid-cols-2 gap-4 text-sm">
        <div><p class="text-gray-500">Name</p><p id="pName" class="font-semibold"></p></div>
        <div><p class="text-gray-500">Student ID</p><p id="pId" class="font-mono font-semibold text-indigo-600"></p></div>
        <div><p class="text-gray-500">Class</p><p id="pClass" class="font-semibold"></p></div>
        <div><p class="text-gray-500">Roll Number</p><p id="pRoll" class="font-semibold"></p></div>
      </div>
    </div>

    <!-- Today's Attendance -->
    <div id="attendanceCard" class="hidden bg-white rounded-xl shadow p-6 mb-6">
      <h2 class="text-lg font-bold text-gray-800 mb-3">Today's Attendance</h2>
      <div id="attendanceStatusBox" class="rounded-lg p-4 text-center"></div>
    </div>

    <!-- Recent Attendance History -->
    <div id="attendanceHistoryCard" class="hidden bg-white rounded-xl shadow p-6 mb-6">
      <h2 class="text-lg font-bold text-gray-800 mb-3">Recent Attendance</h2>
      <div id="attendanceHistoryList" class="space-y-2 text-sm"></div>
    </div>

    <!-- Fee Status -->
    <div id="feeCard" class="hidden bg-white rounded-xl shadow p-6 mb-6">
      <h2 class="text-lg font-bold text-gray-800 mb-3">This Month's Fee</h2>
      <div id="feeStatusBox" class="rounded-lg p-4 text-center"></div>
    </div>

    <!-- Results -->
    <div id="resultsCard" class="hidden bg-white rounded-xl shadow p-6 mb-6">
      <h2 class="text-lg font-bold text-gray-800 mb-3">📋 Exam Results</h2>
      <div id="parentResultsList" class="space-y-3"></div>
    </div>

    <!-- Notices -->
    <div id="noticesCard" class="hidden bg-white rounded-xl shadow p-6 mb-6">
      <h2 class="text-lg font-bold text-gray-800 mb-3">📢 Notices</h2>
      <div id="parentNoticesList" class="space-y-3"></div>
    </div>

    <!-- Footer note -->
    <p class="text-center text-gray-400 text-xs pb-6">School Management System</p>

  </div>

  <script src="../js/firebase-config.js"></script>
  <script>
    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = '../index.html';
        return;
      }

      const userDoc = await db.collection('users').doc(user.uid).get();
      if (!userDoc.exists || userDoc.data().role !== 'parent') {
        alert('Access denied.');
        await auth.signOut();
        window.location.href = '../index.html';
        return;
      }

      const studentId = userDoc.data().studentId;
      const studentDoc = await db.collection('students').doc(studentId).get();

      if (studentDoc.exists) {
        const s = studentDoc.data();
        document.getElementById('pName').textContent = s.name;
        document.getElementById('pId').textContent = s.studentId;
        document.getElementById('pClass').textContent = s.class + (s.section ? '-' + s.section : '');
        document.getElementById('pRoll').textContent = s.rollNumber || '-';
        document.getElementById('studentCard').classList.remove('hidden');

        await loadTodayAttendance(studentId);
        await loadAttendanceHistory(studentId);
        await loadFeeStatus(studentId, s.class);
        await loadParentResults(studentId);
        await loadParentNotices(s.class);
      }

      document.getElementById('loadingBox').classList.add('hidden');
    });

    // --- Fee Status (Current Month) ---
    async function loadFeeStatus(studentId, studentClass) {
      const now = new Date();
      const month = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
      const box = document.getElementById('feeStatusBox');

      try {
        document.getElementById('feeCard').classList.remove('hidden');
        const doc = await db.collection('fees').doc(`${studentId}_${month}`).get();

        if (doc.exists && doc.data().status === 'paid') {
          const f = doc.data();
          box.className = 'rounded-lg p-4 text-center bg-green-50 text-green-700';
          box.innerHTML = `<p class="text-2xl">✅</p><p class="font-bold mt-1">Paid</p><p class="text-sm">Rs. ${f.amount} on ${f.paidDate}</p>`;
        } else {
          // Fee structure se amount nikalo
          let amount = 0;
          const structDoc = await db.collection('feeStructure').doc(studentClass).get();
          if (structDoc.exists) amount = structDoc.data().monthlyAmount;

          box.className = 'rounded-lg p-4 text-center bg-red-50 text-red-700';
          box.innerHTML = `<p class="text-2xl">⚠️</p><p class="font-bold mt-1">Unpaid</p><p class="text-sm">${amount ? 'Rs. ' + amount : 'Contact school office'}</p>`;
        }
      } catch (error) {
        console.error('Error loading fee status:', error);
      }
    }

    // --- Exam Results ---
    async function loadParentResults(studentId) {
      try {
        const snap = await db.collection('results').where('studentId', '==', studentId).get();
        if (snap.empty) return;

        document.getElementById('resultsCard').classList.remove('hidden');
        const list = document.getElementById('parentResultsList');
        list.innerHTML = '';

        snap.forEach(doc => {
          const r = doc.data();
          const row = document.createElement('div');
          row.className = 'border-b border-gray-100 pb-3';
          row.innerHTML = `
            <p class="font-semibold text-gray-800">${r.examName}</p>
            <p class="text-sm text-gray-600">${r.totalObtained} / ${r.totalMax} (${r.percentage.toFixed(1)}%)</p>
          `;
          list.appendChild(row);
        });
      } catch (error) {
        console.error('Error loading results:', error);
      }
    }

    // --- Notices ---
    async function loadParentNotices(studentClass) {
      try {
        const snap = await db.collection('notices').orderBy('createdAt', 'desc').limit(10).get();
        const relevant = [];
        snap.forEach(doc => {
          const n = doc.data();
          if (!n.targetClass || n.targetClass === studentClass) relevant.push(n);
        });

        if (relevant.length === 0) return;

        document.getElementById('noticesCard').classList.remove('hidden');
        const list = document.getElementById('parentNoticesList');
        list.innerHTML = '';

        relevant.forEach(n => {
          const date = n.createdAt ? n.createdAt.toDate().toLocaleDateString('en-PK') : '';
          const card = document.createElement('div');
          card.className = 'border-b border-gray-100 pb-3';
          card.innerHTML = `
            <p class="font-semibold text-gray-800">${n.title}</p>
            <p class="text-xs text-gray-400">${date}</p>
            <p class="text-sm text-gray-600 mt-1">${n.message}</p>
          `;
          list.appendChild(card);
        });
      } catch (error) {
        console.error('Error loading notices:', error);
      }
    }

    // --- Aaj ki Attendance Dikhana ---
    async function loadTodayAttendance(studentId) {
      const today = new Date().toISOString().split('T')[0];
      const docId = `${today}_${studentId}`;
      const box = document.getElementById('attendanceStatusBox');

      try {
        const doc = await db.collection('attendance').doc(docId).get();
        document.getElementById('attendanceCard').classList.remove('hidden');

        if (!doc.exists) {
          box.className = 'rounded-lg p-4 text-center bg-gray-100 text-gray-500';
          box.innerHTML = '<p class="font-semibold">Abhi tak scan nahi hua</p>';
          return;
        }

        const d = doc.data();
        if (d.status === 'present') {
          box.className = 'rounded-lg p-4 text-center bg-green-50 text-green-700';
          box.innerHTML = `<p class="text-2xl">✅</p><p class="font-bold mt-1">Present</p><p class="text-sm">${d.timeDisplay} (${d.gate})</p>`;
        } else {
          box.className = 'rounded-lg p-4 text-center bg-yellow-50 text-yellow-700';
          box.innerHTML = `<p class="text-2xl">⏰</p><p class="font-bold mt-1">Late</p><p class="text-sm">${d.timeDisplay} (${d.gate})</p>`;
        }
      } catch (error) {
        console.error('Error loading attendance:', error);
      }
    }

    // --- Pichle Records Dikhana ---
    async function loadAttendanceHistory(studentId) {
      try {
        const snap = await db.collection('attendance')
          .where('personId', '==', studentId)
          .orderBy('date', 'desc')
          .limit(10)
          .get();

        if (snap.empty) return;

        document.getElementById('attendanceHistoryCard').classList.remove('hidden');
        const list = document.getElementById('attendanceHistoryList');
        list.innerHTML = '';

        snap.forEach(doc => {
          const d = doc.data();
          const statusColor = d.status === 'present' ? 'text-green-600' : 'text-yellow-600';
          const row = document.createElement('div');
          row.className = 'flex justify-between items-center border-b border-gray-100 pb-2';
          row.innerHTML = `
            <span class="text-gray-600">${d.date}</span>
            <span class="${statusColor} font-semibold capitalize">${d.status}</span>
            <span class="text-gray-400 text-xs">${d.timeDisplay}</span>
          `;
          list.appendChild(row);
        });
      } catch (error) {
        console.error('Error loading history:', error);
      }
    }

    function logout() {
      auth.signOut().then(() => {
        window.location.href = '../index.html';
      });
    }
  </script>
</body>
</html>
