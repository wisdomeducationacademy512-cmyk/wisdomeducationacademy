<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - School Management System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-indigo-900 min-h-screen text-white fixed">
      <div class="p-6 border-b border-indigo-800">
        <h1 class="text-xl font-bold">🏫 Admin Panel</h1>
        <p id="schoolName" class="text-indigo-300 text-sm mt-1">School Management</p>
      </div>
      <nav class="p-4 space-y-1">
        <a href="#" onclick="showSection('overview')" class="nav-link block px-4 py-3 rounded-lg hover:bg-indigo-800 transition">📊 Overview</a>
        <a href="#" onclick="showSection('students')" class="nav-link block px-4 py-3 rounded-lg hover:bg-indigo-800 transition">🎓 Students</a>
        <a href="#" onclick="showSection('addStudent')" class="nav-link block px-4 py-3 rounded-lg hover:bg-indigo-800 transition">➕ Add Student</a>
        <button onclick="logout()" class="w-full text-left px-4 py-3 rounded-lg hover:bg-red-700 transition mt-8 text-red-200">🚪 Logout</button>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 flex-1 p-8">

      <!-- OVERVIEW SECTION -->
      <section id="overview-section">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Dashboard Overview</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <div class="bg-white p-6 rounded-xl shadow">
            <p class="text-gray-500 text-sm">Total Students</p>
            <p id="totalStudents" class="text-3xl font-bold text-indigo-600 mt-2">0</p>
          </div>
          <div class="bg-white p-6 rounded-xl shadow">
            <p class="text-gray-500 text-sm">Total Teachers</p>
            <p id="totalTeachers" class="text-3xl font-bold text-green-600 mt-2">0</p>
          </div>
          <div class="bg-white p-6 rounded-xl shadow">
            <p class="text-gray-500 text-sm">Present Today</p>
            <p id="presentToday" class="text-3xl font-bold text-blue-600 mt-2">0</p>
          </div>
          <div class="bg-white p-6 rounded-xl shadow">
            <p class="text-gray-500 text-sm">Absent Today</p>
            <p id="absentToday" class="text-3xl font-bold text-red-600 mt-2">0</p>
          </div>
        </div>
      </section>

      <!-- STUDENTS LIST SECTION -->
      <section id="students-section" class="hidden">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">All Students</h2>
        <div class="bg-white rounded-xl shadow overflow-hidden">
          <table class="w-full text-left">
            <thead class="bg-gray-100">
              <tr>
                <th class="px-4 py-3 text-sm font-semibold text-gray-600">Student ID</th>
                <th class="px-4 py-3 text-sm font-semibold text-gray-600">Name</th>
                <th class="px-4 py-3 text-sm font-semibold text-gray-600">Class</th>
                <th class="px-4 py-3 text-sm font-semibold text-gray-600">Parent Phone</th>
                <th class="px-4 py-3 text-sm font-semibold text-gray-600">Actions</th>
              </tr>
            </thead>
            <tbody id="studentsTableBody">
              <!-- Students will load here -->
            </tbody>
          </table>
          <p id="noStudents" class="text-center text-gray-400 py-8 hidden">No students added yet.</p>
        </div>
      </section>

      <!-- EDIT STUDENT MODAL (hidden by default) -->
      <div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-lg mx-4">
          <h3 class="text-xl font-bold text-gray-800 mb-4">Edit Student</h3>
          <div id="editErrorBox" class="hidden bg-red-50 border border-red-300 text-red-700 px-4 py-2 rounded-lg mb-4 text-sm"></div>

          <form id="editStudentForm" class="space-y-3">
            <input type="hidden" id="editStudentId">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Student Full Name</label>
              <input type="text" id="editName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Class</label>
                <input type="text" id="editClass" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Section</label>
                <input type="text" id="editSection" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Roll Number</label>
              <input type="text" id="editRoll" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Parent Name</label>
              <input type="text" id="editParentName" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Parent Phone (note: changing this does NOT change login password)</label>
              <input type="text" id="editParentPhone" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
              <textarea id="editAddress" class="w-full px-4 py-2 border border-gray-300 rounded-lg"></textarea>
            </div>

            <div class="flex gap-3 pt-2">
              <button type="submit" id="editSaveBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition">Save Changes</button>
              <button type="button" onclick="closeEditModal()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 rounded-lg transition">Cancel</button>
            </div>
          </form>
        </div>
      </div>

      <!-- ADD STUDENT SECTION -->
      <section id="addStudent-section" class="hidden">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Add New Student</h2>

        <div id="successBox" class="hidden bg-green-50 border border-green-300 text-green-800 px-4 py-4 rounded-lg mb-6"></div>
        <div id="errorBoxAS" class="hidden bg-red-50 border border-red-300 text-red-700 px-4 py-3 rounded-lg mb-6 text-sm"></div>

        <form id="addStudentForm" class="bg-white p-6 rounded-xl shadow space-y-4 max-w-2xl">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Student Full Name *</label>
              <input type="text" id="studentName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Class *</label>
              <input type="text" id="studentClass" required placeholder="e.g. 8" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Section</label>
              <input type="text" id="studentSection" placeholder="e.g. A" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Roll Number</label>
              <input type="text" id="rollNumber" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Parent Name *</label>
            <input type="text" id="parentName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Parent Phone Number * (used as login password)</label>
            <input type="text" id="parentPhone" required placeholder="03001234567" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
            <textarea id="studentAddress" class="w-full px-4 py-2 border border-gray-300 rounded-lg"></textarea>
          </div>

          <button type="submit" id="addStudentBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-3 rounded-lg transition">
            Generate ID & Add Student
          </button>
        </form>
      </section>

    </main>
  </div>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/admin-dashboard.js"></script>
  <script src="../js/add-student.js"></script>
</body>
</html>
